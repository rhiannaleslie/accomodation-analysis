# Site settings
title: "Accommodation Analysis"
description: "Interactive analysis of accommodation reviews and travel maps"
url: "https://rhiannaleslie.github.io"  # Replace with your GitHub username
baseurl: "/accomodation-analysis"  # Replace with your repo name

# Build settings
markdown: kramdown
highlighter: rouge
# theme: minima  # Removed - using custom layouts instead

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/

# Include files
include:
  - _pages

# Custom variables
author: "Rhianna Leslie"
email: "rhiannaleslie@hotmail.co.uk"